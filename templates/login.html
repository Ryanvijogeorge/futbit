{% extends "base.html" %}

{% block content %}

<div class="auth-card">

<h1>Login</h1>

<form method="POST">

<input
type="text"
name="username"
placeholder="name in lowercase"
required
>

<input
type="password"
name="password"
placeholder="Password"
required
>

<button class="auth-btn">

Login

</button>

</form>

<p>

No account?

<a href="{{url_for('register')}}">

Register

</a>

</p>

</div>

{% endblock %}
